<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Amazon Ads Reports</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .wrap{max-width:640px;width:100%;padding:40px 24px;}
  .logo{font-size:13px;font-weight:800;color:#2563eb;letter-spacing:.08em;text-transform:uppercase;margin-bottom:40px;}
  h1{font-size:28px;font-weight:800;color:#0f172a;margin-bottom:8px;}
  .sub{font-size:14px;color:#64748b;margin-bottom:40px;}
  .cards{display:flex;flex-direction:column;gap:12px;}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .card:hover{border-color:#2563eb;box-shadow:0 4px 16px rgba(37,99,235,.12);transform:translateY(-1px);}
  .card-left{display:flex;align-items:center;gap:16px;}
  .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .card-name{font-size:16px;font-weight:700;color:#0f172a;}
  .card-meta{font-size:12px;color:#94a3b8;margin-top:2px;font-family:monospace;}
  .arrow{color:#94a3b8;font-size:18px;}
  .card:hover .arrow{color:#2563eb;}
  .footer{margin-top:40px;font-size:11px;color:#cbd5e1;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">⚡ Amazon Ads Reports</div>
  <h1>廣告績效看板</h1>
  <p class="sub">點擊品牌查看最新週報 · 每週自動更新</p>
  <div class="cards">
    <a class="card" href="./daiken/">
      <div class="card-left">
        <div class="dot" style="background:#2563eb"></div>
        <div>
          <div class="card-name">DAIKEN</div>
          <div class="card-meta">US Market · Feb–Mar 2026 · W1–W5</div>
        </div>
      </div>
      <span class="arrow">→</span>
    </a>
    <!-- 新品牌往下加 -->
  </div>
  <div class="footer">Powered by Amazon Autopilot · SNIPER Mastermind</div>
</div>
</body>
</html>
