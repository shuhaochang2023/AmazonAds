<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KIJO · US Market — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{text-align:center;padding:48px 24px;}
.badge{display:inline-block;background:#be185d;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:24px;}
h1{font-size:36px;font-weight:800;color:#0f172a;margin-bottom:8px;}
.market{font-size:14px;color:#64748b;margin-bottom:40px;}
.status{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:32px 48px;display:inline-block;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.status-icon{font-size:40px;margin-bottom:12px;}
.status-text{font-size:15px;font-weight:600;color:#475569;}
.status-sub{font-size:12px;color:#94a3b8;margin-top:6px;}
.back{margin-top:32px;}
.back a{font-size:13px;color:#2563eb;text-decoration:none;font-weight:600;}
.back a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="wrap">
  <div class="badge">US Market</div>
  <h1>KIJO</h1>
  <p class="market">廣告績效週報 · 即將上線</p>
  <div class="status">
    <div class="status-icon">🔧</div>
    <div class="status-text">報告建置中</div>
    <div class="status-sub">資料準備完成後將自動更新</div>
  </div>
  <div class="back"><a href="/">← 返回總覽</a></div>
</div>
</body>
</html>
